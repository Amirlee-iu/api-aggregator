<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人API中转聚合站 - 低价 + 稳定性监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            background-image: 
                linear-gradient(90deg, transparent 24%, rgba(255, 0, 255, 0.05) 25%, rgba(255, 0, 128, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 128, 0.05) 75%, rgba(255, 0, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 128, 0.05) 25%, rgba(255, 0, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 255, 0.05) 75%, rgba(255, 0, 128, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            min-height: 100vh;
            color: #00ffff;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 霓虹灯发光效果 */
        .neon {
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0066ff, 0 0 30px #00ffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 128, 0.1));
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 40px 20px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 48px;
            color: #00ffff;
            margin-bottom: 10px;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0066ff, 0 0 30px #00ffff;
        }

        .header p {
            color: #ff00ff;
            font-size: 16px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            padding: 8px 16px;
            border: 1px solid #00ffff;
            margin: 5px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 搜索框 */
        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #00ffff;
            background: rgba(0, 30, 40, 0.8);
            color: #00ffff;
            font-size: 16px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .search-input::placeholder {
            color: #00ffff;
            opacity: 0.5;
        }

        /* 选项卡 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            color: #00ffff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 5px;
            font-size: 14px;
        }

        .tab-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .tab-btn.active {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
            text-shadow: 0 0 10px #00ffff;
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: linear-gradient(135deg, rgba(0, 30, 50, 0.8), rgba(20, 0, 40, 0.8));
            border: 2px solid #00ffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.05);
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            background: linear-gradient(135deg, rgba(0, 50, 80, 0.9), rgba(30, 0, 60, 0.9));
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6), inset 0 0 20px rgba(0, 255, 255, 0.1);
            border-color: #ff00ff;
        }

        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 0, 128, 0.1);
            border-left: 3px solid #ff00ff;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            color: #ff00ff;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        .status-dot.offline {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }

        .status-dot.slow {
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00;
            animation: pulse 1.5s infinite;
        }

        .status-dot.loading {
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .card-title {
            font-size: 24px;
            color: #00ffff;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
        }

        .card-price {
            font-size: 18px;
            color: #ff00ff;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255, 0, 128, 0.1);
            padding: 10px;
            border-left: 3px solid #ff00ff;
            border-radius: 5px;
            text-shadow: 0 0 5px #ff00ff;
        }

        .card-models {
            margin-bottom: 12px;
        }

        .card-models-label {
            font-size: 12px;
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .model-tag {
            display: inline-block;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            padding: 5px 10px;
            margin: 3px;
            font-size: 12px;
            border: 1px solid #00ffff;
            border-radius: 5px;
        }

        .features {
            margin-bottom: 15px;
        }

        .feature-tag {
            display: inline-block;
            background: rgba(255, 0, 128, 0.2);
            color: #ff00ff;
            padding: 6px 12px;
            margin: 4px;
            font-size: 11px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            font-weight: bold;
        }

        .card-owner {
            font-size: 12px;
            color: #00ffff;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .btn-visit {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 2px solid #00ffff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .btn-visit:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            text-shadow: 0 0 10px #00ffff;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00ffff;
            font-size: 20px;
            text-shadow: 0 0 10px #00ffff;
        }

        /* 底部风险声明 */
        .risk-disclaimer {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), rgba(255, 0, 128, 0.1));
            border: 2px solid #ff0000;
            padding: 25px;
            margin-top: 50px;
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3), inset 0 0 20px rgba(255, 0, 0, 0.05);
            border-radius: 10px;
        }

        .risk-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #ff0000;
        }

        .risk-content {
            line-height: 1.8;
            font-size: 14px;
        }

        .risk-item {
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .risk-item:before {
            content: "⚠️";
            position: absolute;
            left: 0;
        }

        /* 官方站点分类 */
        .section-title {
            font-size: 28px;
            color: #00ffff;
            margin: 40px 0 20px;
            text-align: center;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0066ff;
        }

        .official-label {
            display: inline-block;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 5px;
            margin-left: 10px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🚀 私人API中转聚合站</h1>
            <p>低价优选 + 实时稳定性监控</p>
            <span class="badge">💰 极低价格</span>
            <span class="badge">📡 实时监控</span>
            <span class="badge">⚠️ 风险提示</span>
        </div>

        <!-- 搜索框 -->
        <div class="search-wrapper">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input"
                placeholder="搜索站点名称、模型... 如 Claude, GPT-4, DeepSeek"
            >
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="private">
                🔒 私人中转站
            </button>
            <button class="tab-btn" data-tab="official">
                ✅ 官方站点
            </button>
        </div>

        <!-- 私人中转站部分 -->
        <div id="privateSection" class="tab-content">
            <h2 class="section-title">🔒 私人中转站</h2>
            <div id="privateCardsGrid" class="cards-grid"></div>
        </div>

        <!-- 官方站点部分 -->
        <div id="officialSection" class="tab-content" style="display: none;">
            <h2 class="section-title">✅ 官方站点 <span class="official-label">可靠</span></h2>
            <div id="officialCardsGrid" class="cards-grid"></div>
        </div>

        <!-- 无结果 -->
        <div id="emptyState" class="empty-state" style="display: none;">
            ❌ 未找到匹配的站点，请调整搜索条件
        </div>
    </div>

    <!-- 底部风险声明 -->
    <div class="risk-disclaimer">
        <div class="risk-title">⚠️ 重要风险声明</div>
        <div class="risk-content">
            <div class="risk-item">
                本站聚合的私人API中转站由个人或小团队运营，<strong>存在随时跑路的风险</strong>
            </div>
            <div class="risk-item">
                建议：<strong>仅充值小额资金（50-200元）用于测试</strong>，不要大额充值
            </div>
            <div class="risk-item">
                定期检查账户，及时提现余额。本站不对任何站点的关闭、跑路、数据泄露等问题负责
            </div>
            <div class="risk-item">
                如需稳定服务，请优先使用官方API或大型正规中转服务
            </div>
            <div class="risk-item">
                本站仅供参考，使用任何服务前请自行评估风险。使用即表示同意此声明
            </div>
        </div>
    </div>

    <!-- 加载 sites.js 配置文件 -->
    <script src="sites.js"></script>

    <script>
        // ============ 状态检测核心逻辑 ============
        
        // 方案 A: 简单的 HEAD/GET 请求检测（不需要后端）
        async function checkSiteStatus(healthcheck_url, timeout = 5000) {
            if (!healthcheck_url) {
                return { status: 'unknown', message: '未配置检测' };
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);

                // 使用 HEAD 请求进行轻量检测，跨域问题用 no-cors
                const response = await fetch(healthcheck_url, {
                    method: 'GET',
                    mode: 'no-cors',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                // no-cors 模式下状态码可能不可用，用响应来判断
                if (response.ok || response.status === 0) {
                    return { 
                        status: 'online', 
                        message: '🟢 在线',
                        latency: 'fast'
                    };
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    return { 
                        status: 'slow', 
                        message: '🟡 延迟高或超时',
                        latency: 'slow'
                    };
                }
                return { 
                    status: 'offline', 
                    message: '🔴 离线',
                    latency: 'dead'
                };
            }

            return { 
                status: 'offline', 
                message: '🔴 离线',
                latency: 'dead'
            };
        }

        // 方案 B: 整合 Uptime Kuma API - 简单版
        const KUMA_CONFIG = {
            baseUrl: "https://demo.kuma.pet",
            apiEndpoint: "/api/status-page/default"
        };

        async function checkWithUptimeKuma(kumaId) {
            if (!kumaId) return null;

            try {
                const url = `${KUMA_CONFIG.baseUrl}${KUMA_CONFIG.apiEndpoint}`;
                const response = await fetch(url);
                
                if (!response.ok) return null;
                
                const data = await response.json();
                
                if (data.monitors && Array.isArray(data.monitors)) {
                    const monitor = data.monitors.find(m => m.id == kumaId);
                    
                    if (monitor) {
                        if (monitor.status === 1) {
                            return { 
                                status: 'online', 
                                message: '🟢 在线'
                            };
                        } else {
                            return { 
                                status: 'offline', 
                                message: '🔴 离线'
                            };
                        }
                    }
                }
                
                return null;
            } catch (e) {
                console.log('Kuma 检测失败');
                return null;
            }
        }

        // 渲染卡片
        function renderCard(site, isOfficial = false) {
            return `
                <div class="card">
                    <div class="status-indicator" id="status-${site.id}">
                        <span class="status-dot loading"></span>
                        <span>检测中...</span>
                    </div>

                    <div class="card-title">${site.name}</div>
                    
                    ${site.price ? `<div class="card-price">💵 ${site.price}</div>` : ''}
                    
                    <div class="card-owner">运营方: ${site.owner}</div>

                    <div class="card-models">
                        <div class="card-models-label">支持模型:</div>
                        ${site.models.map(m => `<span class="model-tag">${m}</span>`).join('')}
                    </div>

                    <div class="features">
                        ${site.features.map(f => `<span class="feature-tag">✓ ${f}</span>`).join('')}
                    </div>

                    <button class="btn-visit" onclick="window.open('${site.url}', '_blank')">
                        → 访问站点
                    </button>
                </div>
            `;
        }

        // 初始化并渲染所有卡片
        function initializeCards() {
            const privateGrid = document.getElementById('privateCardsGrid');
            const officialGrid = document.getElementById('officialCardsGrid');

            // 渲染私人站点
            privateGrid.innerHTML = sites.map(site => renderCard(site)).join('');

            // 渲染官方站点
            officialGrid.innerHTML = official_sites.map(site => renderCard(site, true)).join('');

            // 启动状态检测（仅私人站点）
            sites.forEach(site => {
                monitorSiteStatus(site);
            });
        }

        // 监控单个站点状态并更新 UI
        async function monitorSiteStatus(site) {
            const statusEl = document.getElementById(`status-${site.id}`);
            if (!statusEl) return;

            // 方案 B：优先使用 Uptime Kuma
            let result = null;
            if (site.uptime_kuma_id) {
                result = await checkWithUptimeKuma(site.uptime_kuma_id);
            }

            // 方案 A：回退到简单检测
            if (!result && site.healthcheck_url) {
                result = await checkSiteStatus(site.healthcheck_url);
            }

            if (result) {
                const statusDot = statusEl.querySelector('.status-dot');
                const statusText = statusEl.querySelector('span:last-child');

                statusDot.className = `status-dot ${result.status}`;
                statusText.textContent = result.message;

                // 每 30 秒重新检测一次
                setTimeout(() => monitorSiteStatus(site), 30000);
            }
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const allSites = [...sites, ...official_sites];
            
            const filtered = allSites.filter(site =>
                site.name.toLowerCase().includes(query) ||
                (site.models && site.models.some(m => m.toLowerCase().includes(query))) ||
                (site.features && site.features.some(f => f.toLowerCase().includes(query)))
            );

            if (filtered.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('privateCardsGrid').innerHTML = '';
                document.getElementById('officialCardsGrid').innerHTML = '';
            } else {
                document.getElementById('emptyState').style.display = 'none';
                
                const privateFiltered = filtered.filter(s => sites.find(p => p.id === s.id));
                const officialFiltered = filtered.filter(s => official_sites.find(o => o.id === s.id));

                document.getElementById('privateCardsGrid').innerHTML = privateFiltered.map(s => renderCard(s)).join('');
                document.getElementById('officialCardsGrid').innerHTML = officialFiltered.map(s => renderCard(s, true)).join('');
            }
        });

        // 选项卡切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');

                btn.classList.add('active');
                const tab = btn.getAttribute('data-tab');
                
                if (tab === 'private') {
                    document.getElementById('privateSection').style.display = 'block';
                } else {
                    document.getElementById('officialSection').style.display = 'block';
                }
            });
        });

        // 页面加载完成后初始化
        window.addEventListener('load', initializeCards);
    </script>
</body>
</html>
